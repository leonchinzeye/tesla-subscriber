app = 'wattlah-subscriber'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  MQTT_BROKER = '9db6215fdded4176ab506e6c06a95469.s1.eu.hivemq.cloud'
  NEXT_PUBLIC_SUPABASE_URL = 'https://jiqidipetgnlxuxdowye.supabase.co'

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 80
    handlers = ["http"]

  [[services.http_checks]]
    interval = 30000
    timeout = 5000
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
