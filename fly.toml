app = 'wattlah-subscriber'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[env]
  MQTT_BROKER = '9db6215fdded4176ab506e6c06a95469.s1.eu.hivemq.cloud'
  NEXT_PUBLIC_SUPABASE_URL = 'https://jiqidipetgnlxuxdowye.supabase.co'

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = false
  auto_start_machines = true

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
